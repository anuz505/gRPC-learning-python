services:
  server:
    build: ./server
    ports:
      -"8080:8080"
    volumes:
      - ./server:/app
    restart: always
    depends_on:
      - postgres
  client:
    build: ./client
    ports:
      -"8080:8080"
    volumes:
      - ./client:/app
    restart: always
    depends_on:
      - postgres
  postgres:
      image: postgres:15-alpine
      container_name: grpc_db
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: grpc_db
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 10s
        timeout: 5s
        retries: 5
      restart: unless-stopped
  
